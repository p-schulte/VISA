temporal_kernel_size: 9  # Temporal convolution kernel size

# Loss functions
action_name_loss: CrossEntropyLoss
action_name_loss_weight: 1.0  # Weight for the action name loss
argument1_loss_weight: 1.0  # Weight for the argument loss
argument2_loss_weight: 1.0  # Weight for the argument loss
argument_all_loss_weight: 1.0  # Weight for the argument loss


# ST-GCN model configuration
stgcn_model:
  pooling_method: avg  # ("avg", "attention")

  use_lstm: false  # Whether to use an LSTM after the ST-GCN layers
  lstm_num_layers: 1  # Number of layers in the LSTM
  
  stgcn_architecture:
    layers:  # Number of output channels for each ST-GCN layer
      - 64
      - 64
      - 64
      - 64
      - 128
      - 128
      - 128
      - 256
      - 256
      - 256

  
  fcn_dropout: 0.5  # Dropout rate for the fully connected layer


  classifier_head_architecture:
    layers:
      - type: LayerNorm
      - type: Linear
        out_features: 512
      - type: ReLU
      - type: Dropout
        p: 0.2
      - type: Linear
        out_features: 256
      - type: ReLU
      - type: Linear
        out_features: 128
      - type: ReLU
      - type: Linear
        out_features: 1

  # HOW TO PREDICT THE ACTION NAME?
  action_name_prediction:
    method: pairwise
      # whole_sequence: Predict the action name using the whole sequence
      # pairwise: Use every (i, i+1) set of graphs to predict the action name


  # HOW TO PREDICT THE ARGUMENTS?
  argument_prediction:
    method: set_prediction  
    
    parameters:
      set_prediction:
        argument_loss: BCEWithLogitsLoss
        optimizer: AdamW
      two_head_prediction:
        argument_loss: CrossEntropyLoss
        optimizer: AdamW
    
    
# ST-GCN layer-specific settings
stgcn_layer:
  dropout_tcn: 0.5  # Dropout rate for temporal convolutional networks

# Temporal-Spatial convolution settings (empty for now)
temp_spat_conv: {}


# Ablation studies
ablation_studies:
  remove_tcn: false  # Remove the temporal convolution
  use_simple_edge_type: false # Instead of using one partition for every edge type, use only one partition for all edge types and concatenate the edge features to the node features
    # spatial kernel size = 2
    # features = features + (num_relationships or spatial_kernel_size)