threshold_add_edge: 0.1  # Minimum edge weight to add an edge in the graph

# Training parameters
num_epochs: 70  # Total number of training epochs (set to 100 since we use early stopping)
batch_size: 1  # Batch size for training
use_lr_scheduler: false  # Use a learning rate scheduler?

use_early_stopping: false  # Use early stopping?
early_stopping_patience: 5  # Number of epochs with no improvement after which training will be stopped
early_stopping_min_delta: 0.01  # Minimum change to qualify as an improvement

optimizer_params:
  Adam:
    learning_rate: 0.0001  # Learning rate for the optimizer
    weight_decay: 0.0001  # Weight decay (L2 regularization) for optimization
  AdamW:
    learning_rate: 0.001  # Learning rate for the optimizer
    weight_decay: 0.0001  # Weight decay (L2 regularization) for optimization
  SGD:
    learning_rate: 0.01  # Learning rate for the optimizer
    momentum: 0.9  # Momentum for the optimizer
    weight_decay: 0.0001  # Weight decay (L2 regularization) for optimization
  RMSprop:
    learning_rate: 0.0001  # Learning rate for the optimizer
    alpha: 0.99  # Alpha for the optimizer
    weight_decay: 0.0001  # Weight decay (L2 regularization) for optimization

